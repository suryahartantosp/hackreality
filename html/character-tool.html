<!DOCTYPE html>
<html>

<head>

<title>Character Studio — HackReality</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#0b0b16;
color:white;
font-family:Inter;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
text-align:center;
}

.loader{
margin-top:25px;
width:40px;
height:40px;
border:4px solid rgba(255,255,255,0.1);
border-top:4px solid white;
border-radius:50%;
animation:spin 1s linear infinite;
margin-left:auto;
margin-right:auto;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

</style>

</head>

<body>

<div class="box">

<h2>Opening Character Studio...</h2>

<div class="loader"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyA6BZsjkGC97WQ6VhsDo4I1sGMXjTD1ecc",
authDomain:"hack-reality.firebaseapp.com",
projectId:"hack-reality",
storageBucket:"hack-reality.firebasestorage.app",
messagingSenderId:"101142651006",
appId:"1:101142651006:web:77b34b4a69bc88fdcdb82f"

};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

onAuthStateChanged(auth, async (user)=>{

if(!user){
window.location.href="login.html";
return;
}

const uid=user.uid;

const docRef=doc(db,"members",uid);
const docSnap=await getDoc(docRef);

if(!docSnap.exists()){
window.location.href="upgrade.html";
return;
}

const data=docSnap.data();

if(data.approved!==true){
window.location.href="upgrade.html";
return;
}

window.location.href="https://gemini.google.com/share/CHARACTER_LINK_KAMU";

});

</script>

</body>

</html>
