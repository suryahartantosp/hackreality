<!DOCTYPE html>
<html>
<head>

<title>Create Account — HackReality</title>

<style>

body{
background:#F5F1EA;
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#EDE7DE;
padding:40px;
width:300px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin-bottom:15px;
}

button{
width:100%;
padding:10px;
background:black;
color:white;
border:none;
cursor:pointer;
}

button:hover{
opacity:0.8;
}

</style>

</head>

<body>

<div class="box">

<h2>Create Account</h2>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button onclick="signup()">Sign Up</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import { getAuth, createUserWithEmailAndPassword }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

import { getFirestore, doc, setDoc }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyA6BZsjkGC97WQ6VhsDo4I1sGMXjTD1ecc",
authDomain:"hack-reality.firebaseapp.com",
projectId:"hack-reality",
storageBucket:"hack-reality.firebasestorage.app",
messagingSenderId:"101142651006",
appId:"1:101142651006:web:77b34b4a69bc88fdcdb82f"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

window.signup = async function(){

const email = document.getElementById("email").value;

const password = document.getElementById("password").value;

try{

const userCredential = await createUserWithEmailAndPassword(auth,email,password);

const uid = userCredential.user.uid;

await setDoc(doc(db,"members",uid),{

email:email,
approved:false

});

alert("Account created. Please login.");

window.location.href="login.html";

}

catch(error){

alert(error.message);

}

}

</script>

</body>
</html>
