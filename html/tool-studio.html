<!DOCTYPE html>
<html>
<head>

<title>AI Studio — HackReality</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#07081B;
font-family:'Inter',sans-serif;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#0D1028;
padding:40px;
width:360px;
border-radius:12px;
text-align:center;
box-shadow:0 0 40px rgba(0,0,0,0.4);
}

h1{
margin-top:0;
}

input{
width:100%;
padding:12px;
margin-top:15px;
border-radius:6px;
border:none;
background:#151838;
color:white;
}

button{
width:100%;
margin-top:20px;
padding:12px;
border:none;
background:linear-gradient(90deg,#7A5CFF,#9D4EDD);
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

.small{
font-size:12px;
opacity:0.6;
margin-top:10px;
}

</style>

</head>

<body>

<div class="box">

<h1>Marketplace AI Studio</h1>

<p>Authorized access only</p>

<input type="email" id="email" placeholder="Masukkan email terdaftar">

<button onclick="enterStudio()">Enter Studio</button>

<div class="small">
Authorized access only for HackReality members
</div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import { getAuth, onAuthStateChanged }

from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

import {

getFirestore,

collection,

query,

where,

getDocs

}

from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";


const firebaseConfig = {

apiKey: "AIzaSyA6BZsjkGC97WQ6VhsDo4I1sGMXjTD1ecc",

authDomain: "hack-reality.firebaseapp.com",

projectId: "hack-reality",

storageBucket: "hack-reality.firebasestorage.app",

messagingSenderId: "101142651006",

appId: "1:101142651006:web:77b34b4a69bc88fdcdb82f"

};


const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);


window.enterStudio = async function(){

const emailInput = document.getElementById("email").value;


const q = query(

collection(db,"members"),

where("email","==",emailInput),

where("approved","==",true)

);


const querySnapshot = await getDocs(q);


if(querySnapshot.empty){

alert("Access denied. Account belum diapprove.");

return;

}


window.location.href = "https://gemini.google.com/share/ac2f400c7492";

}

</script>

</body>
