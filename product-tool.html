<!DOCTYPE html>
<html>

<head>

<title>Product Studio — HackReality</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#0b0b16;
color:white;
font-family:Inter;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
text-align:center;
width:500px;
}

textarea{
width:100%;
height:120px;
margin-top:20px;
padding:10px;
border-radius:8px;
border:none;
font-family:Inter;
}

button{
margin-top:15px;
padding:10px 20px;
background:white;
color:black;
border:none;
border-radius:6px;
cursor:pointer;
}

pre{
margin-top:20px;
white-space:pre-wrap;
text-align:left;
background:#151525;
padding:15px;
border-radius:8px;
}

</style>

</head>

<body>

<div class="box">

<h2>Product Photo Generator</h2>

<textarea id="prompt" placeholder="Describe your product photo..."></textarea>

<button onclick="generateAI()">Generate</button>

<pre id="result"></pre>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyA6BZsjkGC97WQ6VhsDo4I1sGMXjTD1ecc",
authDomain:"hack-reality.firebaseapp.com",
projectId:"hack-reality",
storageBucket:"hack-reality.firebasestorage.app",
messagingSenderId:"101142651006",
appId:"1:101142651006:web:77b34b4a69bc88fdcdb82f"

};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

onAuthStateChanged(auth, async (user)=>{

if(!user){
window.location.href="login.html";
return;
}

const uid=user.uid;

const docRef=doc(db,"members",uid);
const docSnap=await getDoc(docRef);

if(!docSnap.exists()){
window.location.href="upgrade.html";
return;
}

const data=docSnap.data();

if(data.approved!==true){
window.location.href="upgrade.html";
return;
}

});

</script>

<script>

async function generateAI(){

const prompt = document.getElementById("prompt").value

const response = await fetch("http://localhost:3000/generate",{

method:"POST",
headers:{
"Content-Type":"application/json"
},

body: JSON.stringify({
prompt: "Create a high-end product photography prompt for: " + prompt
})

})

const data = await response.json()

document.getElementById("result").innerText = data.text

}

</script>

</body>

</html>
