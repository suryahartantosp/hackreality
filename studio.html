<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HACKREALITY AI Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus+Jakarta+Sans', sans-serif;
            background: #f8f9fa;
            color: #1a1a1a;
            overflow-x: hidden;
        }
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.03);
        }
        .gradient-text {
            background: linear-gradient(135deg, #1a1a1a 0%, #666 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .premium-btn {
            background: #1a1a1a;
            color: #ffffff;
            transition: all 0.3s ease;
        }
        .premium-btn:hover {
            background: #333;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .input-light {
            background: #ffffff;
            border: 1px solid rgba(0,0,0,0.1);
            color: #1a1a1a;
        }
        .input-light:focus {
            border-color: #000;
            outline: none;
        }
        .loader {
            border: 2px solid #eee;
            border-top: 2px solid #1a1a1a;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden { display: none; }
        
        /* Aspect Ratio Containers */
        .ratio-1-1 { aspect-ratio: 1 / 1; width: 100%; max-width: 500px; }
        .ratio-9-16 { aspect-ratio: 9 / 16; height: 75vh; width: auto; }
        .ratio-16-9 { aspect-ratio: 16 / 9; width: 100%; max-width: 800px; }

        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #ddd; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <!-- MAIN TOOL INTERFACE -->
    <div id="main-studio" class="w-full max-w-7xl min-h-[85vh] flex flex-col lg:flex-row gap-8 py-6">
        
        <!-- Sidebar Controls -->
        <div class="w-full lg:w-80 space-y-4">
            <div class="flex items-center justify-between mb-4">
                <div>
                    <h2 class="text-xl font-bold text-zinc-800">Studio Panel</h2>
                    <p class="text-zinc-500 text-[10px] uppercase tracking-wider">Character Config</p>
                </div>
            </div>

            <div class="glass p-5 rounded-3xl space-y-5 overflow-y-auto max-h-[75vh] pr-2 custom-scrollbar">
                
                <!-- Category: Aspect Ratio -->
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-zinc-500 uppercase">Aspect Ratio / Dimensi</label>
                    <div class="grid grid-cols-3 gap-2">
                        <button onclick="selectRatio('1:1')" class="ratio-opt border border-black/5 bg-black text-white p-2 rounded-lg text-xs transition-all">1:1</button>
                        <button onclick="selectRatio('9:16')" class="ratio-opt border border-black/5 bg-white p-2 rounded-lg text-xs transition-all">9:16</button>
                        <button onclick="selectRatio('16:9')" class="ratio-opt border border-black/5 bg-white p-2 rounded-lg text-xs transition-all">16:9</button>
                    </div>
                </div>

                <!-- Category: Gender -->
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-zinc-500 uppercase">Gender / Jenis Kelamin</label>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="selectVal('gender', 'pria')" class="gender-opt border border-black/5 bg-white p-2 rounded-lg text-xs transition-all">Pria</button>
                        <button onclick="selectVal('gender', 'wanita')" class="gender-opt border border-black/5 bg-black text-white p-2 rounded-lg text-xs transition-all">Wanita</button>
                    </div>
                </div>

                <!-- Category: Age -->
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-zinc-500 uppercase">Age / Umur</label>
                    <select id="age" class="w-full p-2 rounded-lg input-light text-xs focus:outline-none">
                        <option value="child">Anak-anak</option>
                        <option value="teenager">Remaja</option>
                        <option value="young adult 20-30" selected>Dewasa (20-30)</option>
                        <option value="mature 40-50">Orang Tua (40-50)</option>
                        <option value="senior">Lansia</option>
                    </select>
                </div>

                <!-- Category: Hair -->
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-zinc-500 uppercase">Hair Style / Gaya Rambut</label>
                    <select id="hair" class="w-full p-2 rounded-lg input-light text-xs focus:outline-none">
                        <option value="short hair">Pendek</option>
                        <option value="long straight hair">Panjang Lurus</option>
                        <option value="curly hair">Ikal</option>
                        <option value="pixie cut">Pixie Cut</option>
                        <option value="ponytail">Kuncir Kuda</option>
                    </select>
                </div>

                <!-- Category: Origin -->
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-zinc-500 uppercase">Origin / Asal</label>
                    <select id="origin" class="w-full p-2 rounded-lg input-light text-xs focus:outline-none">
                        <option value="Asian">Asia</option>
                        <option value="Japanese">Japanese</option>
                        <option value="Korean">Korean</option>
                        <option value="European">Europe</option>
                        <option value="British">British</option>
                    </select>
                </div>

                <!-- Category: Atmosphere -->
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-zinc-500 uppercase">Atmosphere / Suasana</label>
                    <select id="atmosphere" class="w-full p-2 rounded-lg input-light text-xs focus:outline-none">
                        <option value="daylight, bright natural lighting">Cahaya Siang</option>
                        <option value="golden hour, warm sunset lighting">Golden Hour</option>
                        <option value="clean studio lighting, professional">Studio Bersih</option>
                        <option value="cinematic mood, dramatic shadows">Cinematic Mood</option>
                    </select>
                </div>

                <!-- Micro Adjustments -->
                <div class="space-y-3 pt-3 border-t border-black/5">
                    <div class="flex justify-between items-center">
                        <label class="text-[10px] font-bold text-zinc-500 uppercase">Micro Adjustments</label>
                        <span class="text-[9px] text-zinc-400 italic">Custom Prompt Values</span>
                    </div>
                    <div class="space-y-3">
                        <div class="flex flex-col gap-1">
                            <label class="text-[10px] text-zinc-700">Skin Texture Details</label>
                            <input type="text" id="skin-custom" placeholder="e.g. realistic, 1.2, freckles" class="w-full p-2 rounded-lg input-light text-[11px] placeholder:text-zinc-300">
                        </div>
                        <div class="flex flex-col gap-1">
                            <label class="text-[10px] text-zinc-700">Eye Features</label>
                            <input type="text" id="eye-custom" placeholder="e.g. sharp, blue, 1.5" class="w-full p-2 rounded-lg input-light text-[11px] placeholder:text-zinc-300">
                        </div>
                        <div class="flex flex-col gap-1">
                            <label class="text-[10px] text-zinc-700">Additional Notes</label>
                            <input type="text" id="misc-custom" placeholder="e.g. wearing glasses, earrings" class="w-full p-2 rounded-lg input-light text-[11px] placeholder:text-zinc-300">
                        </div>
                    </div>
                </div>

                <button onclick="generateCharacter()" id="gen-btn" class="w-full py-3 rounded-xl font-bold premium-btn flex items-center justify-center gap-2 text-sm">
                    Generate 8K
                </button>
            </div>
        </div>

        <!-- Preview Area -->
        <div class="flex-1 flex flex-col gap-4">
            <div id="preview-wrapper" class="w-full flex items-center justify-center bg-zinc-100/50 rounded-[2.5rem] p-4 min-h-[600px] overflow-hidden">
                <div id="preview-container" class="glass rounded-3xl flex items-center justify-center overflow-hidden relative shadow-2xl transition-all duration-500 ratio-1-1">
                    <div id="placeholder-text" class="text-zinc-400 text-center p-8">
                        <svg class="w-10 h-10 mx-auto mb-3 opacity-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        <p class="text-xs uppercase tracking-widest font-bold">Ready to Render</p>
                    </div>
                    
                    <div id="loading-state" class="hidden flex flex-col items-center gap-4">
                        <div class="loader"></div>
                        <p class="text-[10px] tracking-widest text-zinc-500 uppercase animate-pulse">Processing Masterpiece...</p>
                    </div>

                    <img id="result-img" class="hidden w-full h-full object-contain animate-fade-in" src="" alt="AI Generated Character">
                    
                    <div class="absolute bottom-4 left-4 flex gap-2">
                       <span id="active-ratio-label" class="px-3 py-1 bg-white/90 backdrop-blur shadow-sm text-[9px] rounded-full uppercase tracking-widest font-bold">1:1</span>
                    </div>
                </div>
            </div>

            <div class="glass p-4 rounded-2xl flex items-center justify-between">
                <div class="flex flex-col gap-1">
                    <span class="text-zinc-800 font-bold text-xs uppercase tracking-tighter">HACKREALITY ENGINE V4.0</span>
                    <div class="flex gap-2 text-zinc-400 text-[9px]">
                        <span class="flex items-center gap-1"><span class="w-1 h-1 bg-green-500 rounded-full"></span> 8K UHD</span>
                        <span class="flex items-center gap-1"><span class="w-1 h-1 bg-blue-500 rounded-full"></span> RAW PHOTOGRAPHY</span>
                    </div>
                </div>
                <button onclick="downloadImage()" class="px-6 py-2 bg-zinc-100 hover:bg-zinc-200 text-zinc-800 rounded-full text-[10px] font-black uppercase tracking-widest transition-all">Save Image</button>
            </div>
        </div>
    </div>

    <script>
        const apiKey = "AIzaSyCOTDS3--Vd8d1Np7CseoqXEIPmsk7fQHk
"; 
        let selectedGender = "wanita";
        let selectedRatio = "1:1";

        function selectRatio(ratio) {
            selectedRatio = ratio;
            const container = document.getElementById('preview-container');
            const label = document.getElementById('active-ratio-label');
            
            document.querySelectorAll('.ratio-opt').forEach(btn => {
                btn.classList.remove('bg-black', 'text-white');
                btn.classList.add('bg-white', 'text-black');
            });
            event.target.classList.add('bg-black', 'text-white');
            event.target.classList.remove('bg-white', 'text-black');

            container.classList.remove('ratio-1-1', 'ratio-9-16', 'ratio-16-9');
            const classMap = { '1:1': 'ratio-1-1', '9:16': 'ratio-9-16', '16:9': 'ratio-16-9' };
            container.classList.add(classMap[ratio]);
            label.innerText = ratio;
        }

        function selectVal(cat, val) {
            if (cat === 'gender') {
                selectedGender = val;
                document.querySelectorAll('.gender-opt').forEach(btn => {
                    btn.classList.remove('bg-black', 'text-white');
                    btn.classList.add('bg-white', 'text-black');
                });
                event.target.classList.add('bg-black', 'text-white');
                event.target.classList.remove('bg-white', 'text-black');
            }
        }

        async function generateCharacter() {
            const btn = document.getElementById('gen-btn');
            const placeholder = document.getElementById('placeholder-text');
            const loader = document.getElementById('loading-state');
            const resultImg = document.getElementById('result-img');
            
            const age = document.getElementById('age').value;
            const hair = document.getElementById('hair').value;
            const origin = document.getElementById('origin').value;
            const atmosphere = document.getElementById('atmosphere').value;
            
            const skinCustom = document.getElementById('skin-custom').value || "natural texture";
            const eyeCustom = document.getElementById('eye-custom').value || "detailed";
            const miscCustom = document.getElementById('misc-custom').value;

            // Mapping ratio string to API expected format
            const apiAspectRatio = selectedRatio; 

            const prompt = `Full body professional advertising photography, captured on 8k resolution. Subject: ${origin} ${selectedGender}, ${age}, ${hair}, looking at camera. Atmosphere: ${atmosphere}. Style: ultra photorealistic, hyper-detailed skin (${skinCustom}), eye details: ${eyeCustom}, ${miscCustom ? miscCustom + ',' : ''} shot on Phase One XF, commercial masterpiece, luxury aesthetic, balanced lighting.`;

            btn.disabled = true;
            btn.innerHTML = '<div class="loader"></div>';
            placeholder.classList.add('hidden');
            resultImg.classList.add('hidden');
            loader.classList.remove('hidden');

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        instances: [{ prompt: prompt }],
                        parameters: { 
                            sampleCount: 1,
                            aspectRatio: apiAspectRatio // CRITICAL: This ensures the AI generates the correct file size
                        }
                    })
                });

                const data = await response.json();
                
                if (data.predictions && data.predictions[0].bytesBase64Encoded) {
                    const base64 = data.predictions[0].bytesBase64Encoded;
                    resultImg.src = `data:image/png;base64,${base64}`;
                    resultImg.classList.remove('hidden');
                    loader.classList.add('hidden');
                } else {
                    throw new Error('Generation failed');
                }
            } catch (error) {
                console.error(error);
                alert('Gagal membuat gambar. Mohon periksa koneksi atau coba lagi nanti.');
                loader.classList.add('hidden');
                placeholder.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Generate 8K';
            }
        }

        function downloadImage() {
            const img = document.getElementById('result-img');
            if (!img.src) return;
            const link = document.createElement('a');
            link.href = img.src;
            link.download = `HACKREALITY_STUDIO_${selectedRatio.replace(':', '-')}_${Date.now()}.png`;
            link.click();
        }

        window.onload = () => {
             document.querySelectorAll('.gender-opt')[1].classList.add('bg-black', 'text-white');
        };
    </script>

</body>
</html>
